<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMD Research Lab | AAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">GMD Research Lab</h1>
                <p class="text-slate-400 mt-1 text-sm uppercase tracking-widest">Autonomous Allocation Mechanism (AAM)</p>
            </div>
            <div id="status-dot" class="flex items-center gap-2 text-xs font-medium text-slate-400">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> OFFLINE
            </div>
        </div>

        <!-- Input Section -->
        <div class="glass p-6 rounded-2xl mb-8 shadow-2xl">
            <label class="block text-sm font-semibold mb-3 text-slate-300">Resource Conflict Scenario</label>
            <textarea id="scenarioInput" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[120px]" 
            placeholder="Describe the conflict (e.g., Trading Bot vs Medical Research)..."></textarea>
            
            <button onclick="runInference()" id="runBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 transition-all font-bold py-3 rounded-xl shadow-lg shadow-blue-900/20">
                EXECUTE ALLOCATION
            </button>
        </div>

        <!-- Result Section -->
        <div id="resultCard" class="hidden glass p-8 rounded-2xl border-l-4 border-blue-500">
            <h3 class="text-blue-400 font-bold mb-4 uppercase text-xs tracking-widest">Decision Rendered</h3>
            <div id="output" class="prose prose-invert max-w-none text-slate-300 leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        // CHANGE THIS TO YOUR LIVE CLOUD RUN URL
        const API_URL = "https://agentic-ai-lab-2026-1054065165765.us-central1.run.app";

        // 1. Check Health Check (The GET Endpoint)
        async function checkStatus() {
            try {
                const res = await fetch(API_URL + "/");
                const data = await res.json();
                if (data.status === "online") {
                    document.getElementById('status-dot').innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500"></div> CLOUD RUN: ONLINE`;
                }
            } catch (e) { console.error("Server unreachable"); }
        }
        checkStatus();

        // 2. Run Inference (The POST Endpoint)
        async function runInference() {
            const scenario = document.getElementById('scenarioInput').value;
            const btn = document.getElementById('runBtn');
            const card = document.getElementById('resultCard');
            const output = document.getElementById('output');

            if(!scenario) return alert("Please enter a scenario.");

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL + "/reason", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario: scenario })
                });
                const data = await response.json();
                
                card.classList.remove('hidden');
                output.innerText = data.analysis;
            } catch (err) {
                alert("Error connecting to the Lab.");
            } finally {
                btn.innerText = "EXECUTE ALLOCATION";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
